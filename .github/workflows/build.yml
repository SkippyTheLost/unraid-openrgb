name: build

on:
  workflow_dispatch:
  push:
    tags: ['20*']

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends curl ca-certificates
      - name: Build OpenRGB bundle
        env:
          VERSION: 2026.06.28.6
        run: bash scripts/build-release.sh
      - uses: actions/upload-artifact@v4
        with:
          name: openrgb-unraid
          path: |
            dist/openrgb-*.tgz
            openrgb.plg
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/openrgb-*.tgz
            openrgb.plg
          generate_release_notes: true
